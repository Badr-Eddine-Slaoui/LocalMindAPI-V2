services:
  caddy:
    image: caddy:alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy_net
    restart: always

volumes:
  caddy_data:
  caddy_config:

networks:
  proxy_net:
    external: true
    name: localmind_proxy